{% extends "base.html" %}

{% block title %}
EasyNMT AI аналізує
{% endblock %}

{% block content %}

<div class="container loader-container">

    <div class="logo">
        EasyNMT
    </div>

    <div class="ai-loader-card loader-focus">
        <div class="loader-icon">🧠</div>

        <h1 class="loader-title">
            EasyNMT AI
        </h1>

        <p id="loader-text" class="loader-main-text">
            Аналізуємо твою ціль...
        </p>

        <div class="loader-bar">
            <div class="loader-fill" id="loader-fill"></div>
        </div>
    </div>

</div>

<script>
    const loaderSteps = [
        { text: "Аналізуємо твою ціль...", progress: "20%" },
        { text: "Вивчаємо твій предмет...", progress: "45%" },
        { text: "Розраховуємо темп підготовки...", progress: "70%" },
        { text: "Створюємо персональний маршрут...", progress: "90%" },
        { text: "План готовий 🚀", progress: "100%" }
    ];

    let currentStep = 0;
    const textElement = document.getElementById("loader-text");
    const fillElement = document.getElementById("loader-fill");

    const interval = setInterval(function() {
        currentStep++;

        if (currentStep < loaderSteps.length) {
            textElement.classList.add("fade-out");

            setTimeout(function() {
                textElement.textContent = loaderSteps[currentStep].text;
                fillElement.style.width = loaderSteps[currentStep].progress;
                textElement.classList.remove("fade-out");
            }, 250);
        } else {
            clearInterval(interval);
            setTimeout(function() {
                window.location.href = "/dashboard";
            }, 700);
        }
    }, 850);
</script>

{% endblock %}
