<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="eb91dnbOK_84BYAKKBVklnLbhqwnMCiQC91WS5oQLEA">

    <title>{% block title %}EasyNMT — легка підготовка до НМТ з AI{% endblock %}</title>

    <meta name="theme-color" content="#6D28D9">
    <meta name="description" content="{% block description %}EasyNMT — українська AI-платформа для персональної підготовки до НМТ з уроками, тестами та збереженням прогресу.{% endblock %}">
    <meta name="robots" content="{% block robots %}noindex, nofollow{% endblock %}">

    <link rel="canonical" href="{% block canonical %}{{ request.url_root.rstrip('/') }}{{ request.path }}{% endblock %}">

    <meta property="og:locale" content="uk_UA">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="EasyNMT">
    <meta property="og:title" content="{% block og_title %}EasyNMT — легка підготовка до НМТ з AI{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Персональний план підготовки до НМТ, уроки, тести та збереження прогресу в одному сервісі.{% endblock %}">
    <meta property="og:url" content="{{ request.url_root.rstrip('/') }}{{ request.path }}">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="EasyNMT — легка підготовка до НМТ з AI">
    <meta name="twitter:description" content="Персональний план, уроки, тести та прогрес для підготовки до НМТ.">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">

    {% block structured_data %}{% endblock %}
    {% block extra_css %}{% endblock %}
</head>

<body class="page-transition">

<div id="page-loader">
    <div class="loader-shell">
        <div class="loader-circle"></div>
        <div class="loader-text">
            EasyNMT
            <span>Готуємо навчальний простір...</span>
        </div>
    </div>
</div>

<main id="page-content">
    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/animations.js') }}"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
