{% extends "base.html" %}
{% block title %}Налаштування | EasyNMT{% endblock %}
{% block content %}
<div class="container">
    <div class="logo">EasyNMT</div>
    <div class="auth-card settings-card">
        <span class="score">⚙️ Налаштування плану</span>
        <span class="desc">Можеш змінити ціль, предмет або час підготовки без створення нового акаунта.</span>
        <form method="post">
            <label>Ціль</label>
            <select name="goal"><option value="150">150+</option><option value="170">170+</option><option value="190">190+</option><option value="200">200</option></select>
            <label>Предмет</label>
            <select name="subject"><option value="math">Математика</option><option value="ukrainian">Українська мова</option><option value="history">Історія України</option><option value="english">Англійська</option></select>
            <label>Час до НМТ</label>
            <select name="time_left"><option value="1-month">1 місяць</option><option value="2-months">2 місяці</option><option value="3-plus">3+ місяці</option><option value="6-plus">6+ місяців</option></select>
            <button type="submit">Зберегти зміни</button>
        </form>
    </div><br>
    <a href="/dashboard"><button class="secondary-action">Назад</button></a>
</div>
{% endblock %}
