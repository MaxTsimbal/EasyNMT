{% extends "base.html" %}{% block title %}EasyNMT v1.0 Beta{% endblock %}{% block content %}
<main class="container" style="max-width:1000px;padding:42px 20px 80px"><section class="glass-card" style="padding:28px"><span class="badge">v1.0 Beta</span><h1>AI Learning Studio</h1><p>EasyNMT сам створює програму, теми, уроки й тести, а потім перевіряє відповіді.</p><div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin:24px 0"><input id="subject" value="{{ subject or 'Математика' }}" placeholder="Предмет"><input id="goal" value="{{ goal or 'Підготовка до НМТ' }}" placeholder="Ціль"><select id="level"><option value="basic">Базовий</option><option value="medium">Середній</option><option value="advanced">Високий</option></select><button class="btn btn-primary" onclick="createProgram()">Створити програму</button></div><div id="status"></div><div id="topics" style="display:grid;gap:12px;margin-top:18px"></div></section></main>
<script>
async function createProgram(){status.textContent='Easy будує маршрут…';const r=await fetch('/api/v1-beta/curriculum',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subject:subject.value,goal:goal.value,level:level.value})});const d=await r.json();if(!d.ok){status.textContent='Помилка: '+d.error;return}status.textContent='Програма готова';topics.innerHTML=d.curriculum.topics.map(t=>`<article class="glass-card" style="padding:16px"><b>${t.position}. ${t.title}</b><p>${t.description||''}</p><button class="btn" onclick="makeLesson(${t.id},this)">Створити урок і тест</button><pre id="topic-${t.id}" style="white-space:pre-wrap"></pre></article>`).join('')}
async function makeLesson(id,btn){btn.disabled=true;btn.textContent='Генерую урок…';let l=await fetch(`/api/v1-beta/topic/${id}/lesson`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(r=>r.json());if(!l.ok){btn.textContent=l.error;return}btn.textContent='Генерую тест…';let q=await fetch(`/api/v1-beta/topic/${id}/quiz`,{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'}).then(r=>r.json());btn.textContent=q.ok?'Урок і тест готові':'Помилка тесту';document.getElementById('topic-'+id).textContent=q.ok?`${l.lesson.content.title}\n12 запитань готово`:q.error}
</script>{% endblock %}
