{% extends "base.html" %}

{% block title %}
Змінити предмет | EasyNMT
{% endblock %}

{% block content %}

<div class="container">

    <div class="logo">
        EasyNMT
    </div>

    <h1>
        🔁 Змінити предмет
    </h1>

    <p>
        Обери новий предмет. EasyNMT оновить стартові уроки під нього.
    </p>

    <div class="goal-grid">

        <form method="post" action="{{ url_for('switch_subject', subject='math') }}" class="goal-link option-action-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="card-action-button">
            <div class="goal-card {% if subject_key == 'math' %}premium{% endif %}">
                <span class="score">📐</span>
                <span class="desc">Математика</span>
            </div>
            </button>
        </form>

        <form method="post" action="{{ url_for('switch_subject', subject='ukrainian') }}" class="goal-link option-action-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="card-action-button">
            <div class="goal-card {% if subject_key == 'ukrainian' %}premium{% endif %}">
                <span class="score">🇺🇦</span>
                <span class="desc">Українська мова</span>
            </div>
            </button>
        </form>

        <form method="post" action="{{ url_for('switch_subject', subject='history') }}" class="goal-link option-action-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="card-action-button">
            <div class="goal-card {% if subject_key == 'history' %}premium{% endif %}">
                <span class="score">📜</span>
                <span class="desc">Історія України</span>
            </div>
            </button>
        </form>

        <form method="post" action="{{ url_for('switch_subject', subject='english') }}" class="goal-link option-action-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <button type="submit" class="card-action-button">
            <div class="goal-card {% if subject_key == 'english' %}premium{% endif %}">
                <span class="score">🇬🇧</span>
                <span class="desc">Англійська мова</span>
            </div>
            </button>
        </form>

    </div>

    <br>

    <a href="/dashboard" class="goal-link">
        <button class="secondary-action">
            Назад у кабінет
        </button>
    </a>

</div>

{% endblock %}
